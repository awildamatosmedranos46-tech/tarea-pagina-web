<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Divertida</title>
</head>
<body>

<h1>🎈 Calculadora Divertida 🎈</h1>

<input type="number" id="num1" placeholder="Número 1">
<br><br>
<input type="number" id="num2" placeholder="Número 2">

<br><br>

<button onclick="sumar()">➕ Sumar</button>
<button onclick="restar()">➖ Restar</button>
<button onclick="multiplicar()">✖️ Multiplicar</button>
<button onclick="dividir()">➗ Dividir</button>

<br><br>

<p id="resultado">Resultado: 😊</p>

<script>
function sumar() {
  let n1 = parseFloat(document.getElementById("num1").value);
  let n2 = parseFloat(document.getElementById("num2").value);

  let resultado = n1 + n2;

  document.getElementById("resultado").innerText = "Resultado: " + resultado;
}

function restar() {
  let n1 = parseFloat(document.getElementById("num1").value);
  let n2 = parseFloat(document.getElementById("num2").value);

  let resultado = n1 - n2;

  document.getElementById("resultado").innerText = "Resultado: " + resultado;
}

function multiplicar() {
  let n1 = parseFloat(document.getElementById("num1").value);
  let n2 = parseFloat(document.getElementById("num2").value);

  let resultado = n1 * n2;

  document.getElementById("resultado").innerText = "Resultado: " + resultado;
}

function dividir() {
  let n1 = parseFloat(document.getElementById("num1").value);
  let n2 = parseFloat(document.getElementById("num2").value);

  if (n2 === 0) {
    document.getElementById("resultado").innerText = "No se puede dividir entre 0 😅";
    return;
  }

  let resultado = n1 / n2;

  document.getElementById("resultado").innerText = "Resultado: " + resultado;
}
</script>

</body>
</html><style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ffecd2, #fcb69f);
    text-align: center;
    padding: 50px;
  }

  h1 {
    color: #ff6f61;
  }

  .contenedor {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    margin: auto;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
  }

  input {
    width: 80%;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: 2px solid #ffb347;
    font-size: 16px;
    text-align: center;
  }

  button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    background-color: #6ec6ff;
  }

  button:hover {
    background-color: #42a5f5;
  }

  #resultado {
    margin-top: 20px;
    font-size: 20px;
    color: #333;
  }
</style>
